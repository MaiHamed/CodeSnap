<!DOCTYPE html>
<html>
<head>
  <title>CodeSnap</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

<div class="container">
  <textarea id="codeInput" placeholder="Paste your code..."></textarea>

  <div class="preview theme-default" id="preview">
    <pre><code id="codeOutput" class="hljs"></code></pre>
  </div>
</div>

<select id="themeSelector">
  <option value="theme-default">Default</option>
  <option value="theme-pink">Pink</option>
  <option value="theme-brown">Brown</option>
</select>

<button onclick="downloadImage()">Export Image</button>

<script src="script.js"></script>

</body>
</html>
